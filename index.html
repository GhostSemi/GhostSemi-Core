<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GhostSemi | Silicon Infrastructure</title>
    <style>
        body { background: #0a0a0c; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 50px; }
        .cta-button { background: #00d4ff; color: black; padding: 15px 30px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .cta-button:hover { background: white; }
        input { padding: 12px; background: #16161a; border: 1px solid #333; color: #00d4ff; width: 280px; }
    </style>
</head>
<body>
    <h1>GHOSTSEMI ALPHA ACCESS</h1>
    <p>Secure your slot in the software-defined silicon queue.</p>

    <div class="registration-box">
        <input type="email" id="userEmail" placeholder="you@company.com" required>
        <br><br>
        <button onclick="submitToGoogle()" class="cta-button">SECURE ACCESS</button>
    </div>

    <script>
    function submitToGoogle() {
        const email = document.getElementById('userEmail').value;
        const btn = document.querySelector('.cta-button');
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyB1NAzzWFo2rjBx8W0i0NOWVDZm_OEwGt_dh9R-phVZ9v4FhooTkTq-anENAYf5DcRvA/exec';

        if(!email.includes('@')) { alert("Invalid Email"); return; }

        btn.innerHTML = "PROVISIONING...";
        btn.disabled = true;

        fetch(scriptURL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: new URLSearchParams({'email': email})
        })
        .then(() => { window.location.href = 'success.html'; })
        .catch(() => { window.location.href = 'success.html'; });
    }
    </script>
</body>
</html>
